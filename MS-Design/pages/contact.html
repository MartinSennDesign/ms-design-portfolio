<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Contacto de MS Design."
  >

  <title>MS Design | Contacto</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap"
    rel="stylesheet"
  >

  <!-- BOOTSTRAP -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- BOOTSTRAP ICONS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  >

  <!-- AOS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="../assets/scss/style.css">

</head>

<body>

  <!-- HEADER -->
  <header>

    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">

      <div class="container">

        <a class="navbar-brand logo" href="../index.html">
          MS Design
        </a>

        <!-- BOTON MOBILE -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Abrir menú de navegación"
        >

          <i class="bi bi-list"></i>

        </button>

        <!-- NAV -->
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarContent"
        >

          <ul class="navbar-nav">

            <li class="nav-item">
              <a class="nav-link" href="../index.html">Inicio</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="about.html">Sobre mí</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="projects.html">Proyectos</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="skills.html">Skills</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="contact.html">
                Contacto
              </a>
            </li>

          </ul>

        </div>

      </div>

    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <section class="contact-page">

      <div class="container">

        <div class="row align-items-center g-5">

          <!-- TEXTO -->
          <div class="col-lg-5">

            <article data-aos="fade-up">

              <p class="section-label">
                Contacto
              </p>

              <h1 class="section-title">
                ¿Hablamos sobre tu próximo proyecto?
              </h1>

              <p class="contact-text">
                Disponible para proyectos visuales,
                branding, diseño digital y desarrollo frontend.
              </p>

            </article>

          </div>

          <!-- FORM -->
          <div class="col-lg-7">

            <form
              class="contact-form"
              data-aos="fade-left"
            >

              <!-- NOMBRE -->
              <div class="mb-4">

                <label
                  for="name"
                  class="form-label"
                >
                  Nombre
                </label>

                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Tu nombre"
                >

              </div>

              <!-- EMAIL -->
              <div class="mb-4">

                <label
                  for="email"
                  class="form-label"
                >
                  Correo electrónico
                </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="correo@email.com"
                >

              </div>

              <!-- MENSAJE -->
              <div class="mb-4">

                <label
                  for="message"
                  class="form-label"
                >
                  Mensaje
                </label>

                <textarea
                  id="message"
                  class="form-control"
                  rows="6"
                  placeholder="Contame sobre tu proyecto"
                ></textarea>

              </div>

              <!-- BOTON -->
              <button
                type="submit"
                class="primary-btn border-0"
              >

                Enviar mensaje

              </button>

            </form>

          </div>

        </div>

      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="container text-center">

      <p>
        MS Design — 2026
      </p>

      <div class="social-links">

        <a href="#">
          <i class="bi bi-instagram"></i>
        </a>

        <a href="#">
          <i class="bi bi-behance"></i>
        </a>

        <a href="#">
          <i class="bi bi-github"></i>
        </a>

      </div>

    </div>

  </footer>

  <!-- BOOTSTRAP -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- JS -->
  <script src="../assets/js/main.js"></script>

</body>

</html>
