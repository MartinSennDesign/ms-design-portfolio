<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- SEO -->
  <meta
    name="description"
    content="Contacto de MS Design."
  >

  <meta
    name="keywords"
    content="Contacto, diseño gráfico, frontend, portfolio"
  >

  <meta
    name="author"
    content="MS Design"
  >

  <title>MS Design | Contacto</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap"
    rel="stylesheet"
  >

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  >

  <!-- AOS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="../assets/scss/style.css"
  >

</head>

<body>

  <!-- header -->
  <header>

    <!-- navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">

      <div class="container">

        <!-- logo -->
        <a
          class="navbar-brand logo"
          href="../index.html"
        >
          MS Design
        </a>

        <!-- boton mobile -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
          aria-controls="navbarContent"
          aria-expanded="false"
          aria-label="Abrir menú de navegación"
        >

          <i class="bi bi-list"></i>

        </button>

        <!-- nav -->
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarContent"
        >

          <ul class="navbar-nav">

            <li class="nav-item">
              <a
                class="nav-link"
                href="../index.html"
              >
                Inicio
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link"
                href="about.html"
              >
                Sobre mí
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link"
                href="projects.html"
              >
                Proyectos
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link"
                href="skills.html"
              >
                Skills
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link active"
                href="contact.html"
              >
                Contacto
              </a>
            </li>

          </ul>

        </div>

      </div>

    </nav>

  </header>

  <!-- main -->
  <main>

    <!-- contacto -->
    <section class="contact-page">

      <div class="container">

        <div class="row align-items-center g-5">

          <!-- texto -->
          <div class="col-lg-5">

            <article data-aos="fade-up">

              <p class="section-label">
                Contacto
              </p>

              <h1 class="section-title">
                ¿Hablamos sobre tu próximo proyecto?
              </h1>

              <p class="contact-text">
                Disponible para proyectos visuales,
                branding, diseño digital
                y desarrollo frontend.
              </p>

            </article>

          </div>

          <!-- formulario -->
          <div class="col-lg-7">

            <form
              class="contact-form"
              data-aos="fade-left"
            >

              <!-- nombre -->
              <div class="mb-4">

                <label
                  for="name"
                  class="form-label"
                >
                  Nombre
                </label>

                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Tu nombre"
                >

              </div>

              <!-- email -->
              <div class="mb-4">

                <label
                  for="email"
                  class="form-label"
                >
                  Correo electrónico
                </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="correo@email.com"
                >

              </div>

              <!-- mensaje -->
              <div class="mb-4">

                <label
                  for="message"
                  class="form-label"
                >
                  Mensaje
                </label>

                <textarea
                  id="message"
                  class="form-control"
                  rows="6"
                  placeholder="Contame sobre tu proyecto"
                ></textarea>

              </div>

              <!-- botón -->
              <button
                type="submit"
                class="primary-btn border-0"
                aria-label="Enviar mensaje"
              >

                Enviar mensaje

              </button>

            </form>

          </div>

        </div>

      </div>

    </section>

  </main>

  <!-- footer -->
  <footer class="footer">

    <div class="container">

      <p>
        MS Design · Portfolio 2026
      </p>

      <div class="social-links">

        <a
          href="https://instagram.com/"
          aria-label="Instagram"
        >
          <i class="bi bi-instagram"></i>
        </a>

        <a
          href="https://behance.net/"
          aria-label="Behance"
        >
          <i class="bi bi-behance"></i>
        </a>

        <a
          href="https://github.com/"
          aria-label="GitHub"
        >
          <i class="bi bi-github"></i>
        </a>

      </div>

    </div>

  </footer>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- JS -->
  <script src="../assets/js/main.js"></script>

</body>

</html>
